name: AI 工作流任务

description: 用于需要经过 Good Question Brief / spec / plan / tasks / PR / CI 的一般项目任务。

title: "[AI Workflow] <任务标题>"

labels:
  - ai-workflow
  - needs-triage

body:
  - type: markdown
    attributes:
      value: |
        提交前请先阅读 `AGENTS.md`、`SOURCE_OF_TRUTH.md`、`ROADMAP.md`。
        本项目不是自动交易系统；任何任务都必须保持研究、样本、指标、执行边界清晰。

  - type: textarea
    id: goal
    attributes:
      label: 目标
      description: 这次任务完成后，项目状态应该发生什么变化？
      placeholder: "例如：建立 GitHub 项目治理入口，使新 Agent 能按统一流程进入项目。"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 背景 / 当前事实
      description: 已知事实、相关文件、前置讨论结论。不要写未经验证的假设。
      placeholder: "相关文件：README.md、ROADMAP.md、10_工程化交接/..."
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 范围
      description: 本次要改什么。
      placeholder: "新增/修改的文件、目录或验证脚本。"
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: 非目标
      description: 本次明确不做什么，防止 Agent 扩大范围。
      placeholder: "例如：不修改交易逻辑、不新增自动下单、不改样本事实。"
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 必须是可检查的行为或文件状态。
      placeholder: |
        - [ ] 文件 A 存在并包含入口说明
        - [ ] 索引和变更记录已更新
        - [ ] python scripts/validate_all.py 通过
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: 验证计划
      description: 要运行哪些命令、人工检查哪些页面。
      placeholder: "python scripts/validate_all.py；GitHub Actions Validate Project。"
    validations:
      required: true

  - type: dropdown
    id: agent_suitability
    attributes:
      label: Agent 执行分类
      options:
        - Autonomous：Agent 可独立完成并验证
        - Needs owner：需要 owner 先做产品/风险/权限/合并决策
        - Research first：需先补资料/样本/反证再实现
    validations:
      required: true

  - type: textarea
    id: owner_decisions
    attributes:
      label: Owner 决策点
      description: 哪些部分不能由 Agent 自行决定。
      placeholder: "例如：是否合并 PR；是否启用分支保护；是否进入 MQL5 MVP。"
    validations:
      required: false
