objective: >
  Run an A-F multi-port workflow loop that can read queue/state, classify the next task,
  route across A/B/C/D/E/F ports, produce durable artifacts, verify results, stop or continue
  according to explicit conditions, and escalate to Owner only at decision gates.

active_thread:
  name: dbskill_batch_2_state_chain_trial
  purpose: >
    Trial dbskill batch 2 state-chain capabilities in small scope for workflow state,
    queue, owner decisions, snapshots, restore, and reports.
  current_status:
    sample_01: validated
    sample_02: validated
    sample_03: validated
    b_source_pack: ready
    e_review: partial_pass_continue_to_f_decision
    f_decision: ACCEPT_SMALL_SCOPE_BATCH_2_TRIAL
    batch_2_trial: authorized
    d_landing: completed
    e_state_chain_verification: PASS_TRIAL_SCOPE
    trial_status: active_with_guardrails

artifacts:
  owner_decision: 10_工程化交接/dbskill第二批状态链试接入Owner决策记录_v0.1.md
  batch_2_trial_plan: 10_工程化交接/dbskill第二批状态链小范围试接入运行方案_v0.1.md
  landing_record: 10_工程化交接/dbskill第二批状态链试接入落库记录_v0.1.md
  initial_snapshot: 10_工程化交接/state_snapshots/20260618_dbskill_batch_2_trial_design_snapshot.yaml
  e_verification: 10_工程化交接/dbskill第二批状态链试接入验证报告_v0.1.md

next_action:
  port: A
  stage: TRIAL_ACTIVE
  task: wait_for_next_real_workflow_change_to_test_state_chain
  requires_owner_input: true

stop_conditions:
  success: batch_2_trial_remains_traceable_and_useful_across_next_real_workflow_change
  pause: waiting_for_next_real_workflow_change
  revise: e_verification_finds_scope_pollution
  blocked: state_chain_requires_global_runtime_or_repo_external_memory

forbidden:
  - install_full_dbskill_repo
  - global_runtime_auto_trigger_without_owner_authorization
  - dbs_decision_replaces_owner_decision
  - dbs_report_replaces_e_verification
  - dbs_save_restore_uses_repo_external_truth
