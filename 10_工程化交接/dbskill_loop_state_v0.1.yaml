loop_id: dbskill-sample-validation-loop-v0.1
status: waiting_for_owner_decision
current_stage: owner_gate
purpose: >
  Validate whether dbskill batch 1 can reliably upgrade ordinary natural-language
  user inputs into clearer, professional, executable workflow routes before any
  batch 2 state-chain capabilities are connected.

samples:
  sample_01:
    status: validated
    file: 10_工程化交接/dbskill样例01_自然语言升级与下一阶段路线_v0.1.md
    input_type: dbskill_plan_continuation
  sample_02:
    status: validated
    file: 10_工程化交接/dbskill样例02_上下文汇总与自然语言专业化测试_v0.1.md
    input_type: context_summary_and_self_test
  sample_03:
    status: validated
    file: 10_工程化交接/dbskill样例03_外部GitHubSkill局部抽取判断测试_v0.1.md
    input_type: external_github_skill_partial_adoption_judgment

batch_1:
  skills:
    - dbs-good-question
    - dbs-deconstruct
    - dbs-goal
    - dbs-diagnosis
  status:
    - small_scope_enabled
    - sample_01_validated
    - sample_02_validated
    - sample_03_validated
    - e_review_partial_pass

batch_2:
  skills:
    - dbs-decision
    - dbs-save
    - dbs-restore
    - dbs-report
  status: pending_owner_decision

artifacts:
  source_pack: 10_工程化交接/dbskill三样例SourcePack_v0.1.md
  e_review: 10_工程化交接/dbskill第一批三样例效果验证报告_v0.1.md
  owner_brief: 10_工程化交接/dbskill第二批状态链试接入OwnerDecisionBrief_v0.1.md

next_action: owner_choose_batch_2_trial_decision

maker_checker_loop:
  maker: A/B/D completed sample reports and source pack
  checker: E completed partial pass review
  owner_gate: F waiting for Owner selection

stop_conditions:
  success: owner_decision_recorded
  pause: waiting_for_owner_decision
  revise: owner_requests_more_samples_or_template_revision
  reject: owner_rejects_batch_2_for_now

forbidden:
  - install_full_dbskill_repo
  - enter_batch_2_without_owner_decision
  - global_runtime_trigger_without_owner_decision
  - let_dbs_diagnosis_replace_f_owner_decision
