loop_id: dbskill-sample-validation-loop-v0.1
status: running
current_stage: sample_validation
purpose: >
  Validate whether dbskill batch 1 can reliably upgrade ordinary natural-language
  user inputs into clearer, professional, executable workflow routes before any
  batch 2 state-chain capabilities are connected.

samples:
  sample_01:
    status: validated
    file: 10_工程化交接/dbskill样例01_自然语言升级与下一阶段路线_v0.1.md
    input_type: dbskill_plan_continuation
  sample_02:
    status: validated
    file: 10_工程化交接/dbskill样例02_上下文汇总与自然语言专业化测试_v0.1.md
    input_type: context_summary_and_self_test
  sample_03:
    status: needed
    file: null
    required_input_type: real_business_strategy_or_workflow_idea

batch_1:
  skills:
    - dbs-good-question
    - dbs-deconstruct
    - dbs-goal
    - dbs-diagnosis
  status:
    - small_scope_enabled
    - sample_01_validated
    - sample_02_validated
    - needs_sample_03

batch_2:
  skills:
    - dbs-decision
    - dbs-save
    - dbs-restore
    - dbs-report
  status: hold_for_sample_03_and_e_review

next_action: collect_real_business_strategy_or_workflow_input_for_sample_03

maker_checker_loop:
  maker: A端生成样例03自然语言专业化升级报告，D端落库
  checker: E端审查三个样例是否真的提升理解、专业化和可执行性
  owner_gate: F端决定是否小范围试接入第二批状态链

stop_conditions:
  success: sample_03_validated_and_e_review_passed_and_f_brief_ready
  pause: waiting_for_owner_real_input_for_sample_03
  revise: e_review_finds_outputs_are_only_pretty_summaries
  reject: batch_1_fails_to_show_actual_improvement

forbidden:
  - install_full_dbskill_repo
  - enter_batch_2_without_sample_03
  - enter_batch_2_without_e_review
  - create_global_runtime_trigger_without_owner_decision
  - let_dbs_diagnosis_replace_f_owner_decision
